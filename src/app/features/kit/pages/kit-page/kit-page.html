<div class="kit-page">
  <h1 class="kit-page__title">Button</h1>

  <section class="kit-page__section">
    <h2 class="kit-page__section-title">primary — короткий / длинный текст</h2>
    <div class="kit-page__row">
      <app-button text="ОК" variant="primary" />
      <app-button text="Поддержать" variant="primary" />
      <app-button text="Поддержать прямо сейчас" variant="primary" />
    </div>
  </section>

  <section class="kit-page__section">
    <h2 class="kit-page__section-title">primary — с иконкой</h2>
    <div class="kit-page__row">
      <app-button text="Поддержать" variant="primary">
        <img icon src="/icons/coin.svg" alt="" />
      </app-button>
      <app-button text="Поддержать прямо сейчас" variant="primary">
        <img icon src="/icons/coin.svg" alt="" />
      </app-button>
    </div>
  </section>

  <section class="kit-page__section">
    <h2 class="kit-page__section-title">secondary — короткий / длинный текст</h2>
    <div class="kit-page__row">
      <app-button text="Сетка" variant="secondary" />
      <app-button text="Турнирная сетка" variant="secondary" />
      <app-button text="Турнирная сетка соревнования" variant="secondary" />
    </div>
  </section>

  <section class="kit-page__section">
    <h2 class="kit-page__section-title">secondary — с иконкой</h2>
    <div class="kit-page__row">
      <app-button text="Сетка" variant="secondary">
        <img icon src="/icons/coin.svg" alt="" />
      </app-button>
    </div>
  </section>
</div>
