<div class="schedule-widget">
  <app-section-title class="schedule-widget__title" text="Расписание" />

  @if (hasError()) {
    <app-error-message />
  } @else {
    <app-list
      [items]="items()"
      [settings]="{ gap: 8 }"
      [loading]="isLoading()"
      [loaderSettings]="{ itemsCount: skeletonRowsCount }"
    />
  }
</div>
