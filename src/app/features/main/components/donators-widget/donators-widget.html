<div class="donators-widget">
  <app-section-title text="Топ донатеров" />

  @if (hasError()) {
    <app-error-message />
  } @else if (!isLoading() && items().length === 0) {
    <p class="donators-widget__empty">Пока никто не поддержал стрим</p>
  } @else {
    <app-list
      class="donators-widget__list"
      [items]="items()"
      [settings]="{ gap: 8 }"
      [loading]="isLoading()"
      [loaderSettings]="{ itemsCount: skeletonRowsCount }"
    />
  }
</div>
