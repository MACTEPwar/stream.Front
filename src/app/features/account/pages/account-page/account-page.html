<div class="account-page">
  <section class="account-page__section">
    <app-section-title text="Профиль" />
    <app-profile-section />
  </section>

  <section class="account-page__section">
    <app-section-title text="Игровые аккаунты" />
    <app-game-accounts-section />
  </section>

  <section class="account-page__section">
    <app-section-title text="Соц. сети" />
    <app-social-links-section />
  </section>

  <app-button
    text="Выйти"
    type="secondary"
    [width]="'content'"
    class="account-page__logout-button"
    (click)="onLogoutClick()"
  />
</div>
