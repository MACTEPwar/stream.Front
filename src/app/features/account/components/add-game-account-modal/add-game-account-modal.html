<div class="add-game-account-modal">
  <h2 class="add-game-account-modal__title">Добавить игровой аккаунт</h2>

  <form class="add-game-account-modal__form" (submit)="$event.preventDefault(); onSubmit()">
    <app-text-field label="Ник" [required]="true" placeholder="Введите ник" [(value)]="nickname" />
    <app-text-field
      label="Id аккаунта"
      [required]="true"
      placeholder="Введите id аккаунта"
      [(value)]="externalId"
    />

    <div class="add-game-account-modal__actions">
      <app-button text="Добавить" type="primary" [width]="'content'" (click)="onSubmit()" />
      <app-button text="Отмена" type="secondary" [width]="'content'" (click)="onCancel()" />
    </div>
  </form>
</div>
