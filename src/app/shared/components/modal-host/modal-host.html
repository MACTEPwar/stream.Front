@if (modalService.activeComponent(); as component) {
  <div
    class="modal-host__backdrop"
    role="button"
    tabindex="0"
    (click)="onBackdropClick($event)"
    (keydown.enter)="close()"
    (keydown.space)="close()"
  >
    <div class="modal-host__panel" role="dialog">
      <button
        type="button"
        class="modal-host__close"
        aria-label="Закрыть окно"
        (click)="close()"
      >
        <img src="/icons/Close_btn.svg" alt="" />
      </button>
      <ng-container
        [ngComponentOutlet]="component"
        [ngComponentOutletInputs]="{ data: modalService.activeData() }"
      />
    </div>
  </div>
}
