<div class="shell">
  <header class="shell__header">
    <a routerLink="/main" class="shell__logo">
      <img src="/images/Logo.png" alt="Belochka" />
    </a>
    <span class="shell__divider" aria-hidden="true">|</span>

    <nav class="shell__nav">
      @for (item of navItems; track item.path; let i = $index) {
        <a
          [routerLink]="item.path"
          routerLinkActive="shell__nav-link--active"
          [routerLinkActiveOptions]="{ exact: item.exact }"
          (isActiveChange)="onNavLinkActiveChange(i, $event)"
          class="shell__nav-link"
        >
          <span #navLinkText class="shell__nav-link-text">{{ item.label }}</span>
          @if (activeIndex() === i) {
            <app-nav-active-indicator class="shell__nav-link-indicator" [width]="navIndicatorWidth()" />
          }
        </a>
      }
    </nav>

    <app-button text="Поддержать" [width]="'content'" class="shell__support-button">
      <img icon src="/icons/button-support-icon.svg" alt="" />
    </app-button>
    <app-button text="Войти" type="secondary" [width]="'content'" class="shell__auth-button" />
  </header>

  <main class="shell__content">
    <ng-content />
  </main>
</div>
