<!--
  Кнопка (stream.Front#39) по макету «Поддержать»/«Сетка». Тело — ОДИН
  элемент с clip-path-шестиугольником (фиксированный вынос углов $corner,
  поэтому при любой ширине тянется только середина, а угол не искажается).
  Фон и бордер однородны по построению — тело цельное, шва колпачок↔середина
  не существует. Бордер = пейл-рамка (.button__frame) под телом,
  инсетнутым на толщину бордера. Кольца-узор, диамант — поверх.
-->
<button
  type="button"
  class="button"
  [class.button--primary]="variant() === 'primary'"
  [class.button--secondary]="variant() === 'secondary'"
>
  <span class="button__frame"></span>
  <span class="button__body">
    <span class="button__rings"></span>
  </span>
  <span class="button__diamond"></span>
  <span class="button__content">
    <ng-content select="[icon]" />
    <span class="button__text">{{ text() }}</span>
  </span>
</button>
